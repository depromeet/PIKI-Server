name: Deploy to Staging (Manual)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: '배포할 브랜치'
        required: true
        default: 'dev'

# 자동 deploy (deploy.yml) 와 같은 EC2 한 대를 공유하므로 group 을 통일해
# 두 워크플로우가 동시에 컨테이너를 조작하는 race 를 차단한다. cancel-in-progress: false
# 로 두어 새 deploy 가 옛 deploy 를 죽이지 않고 대기 — 롤백 가능성을 줄이는 안전 정책.
# 향후 진짜 staging 환경이 분리되면 deploy-staging.yml 신규 + 자기 group 으로 다시 분리한다.
concurrency:
  group: deploy-ec2-dev
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build JAR
        id: build
        run: ./gradlew bootJar --no-daemon

      - name: Login to Docker Hub
        id: docker_login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Sanitize branch name for Docker tag
        id: tag
        run: echo "value=staging-$(echo '${{ github.event.inputs.branch }}' | tr '/' '-')" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        id: docker_push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ci
          push: true
          platforms: linux/arm64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/team3-server:${{ steps.tag.outputs.value }}

      - name: Deploy to Staging EC2
        id: deploy
        uses: appleboy/ssh-action@v1
        env:
          # secrets 를 step env 로 한 번 거쳐 SSH 세션으로 안전하게 전달한다. docker run
          # 명령 문자열에 ${{ secrets.X }} 를 직접 박으면 특수문자 ($ / " / 공백) 가
          # 쉘 해석 단계에서 손상될 수 있다.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          KAKAO_CLIENT_ID: ${{ secrets.KAKAO_CLIENT_ID }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          KAKAO_REDIRECT_URI: ${{ secrets.KAKAO_REDIRECT_URI }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI: ${{ secrets.GOOGLE_REDIRECT_URI }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_PUBLIC_BASE_URL: ${{ secrets.S3_PUBLIC_BASE_URL }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_TAG: ${{ steps.tag.outputs.value }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GEMINI_API_KEY,DB_HOST,DB_PORT,DB_NAME,DB_USERNAME,DB_PASSWORD,JWT_SECRET,REDIS_HOST,REDIS_PORT,KAKAO_CLIENT_ID,KAKAO_CLIENT_SECRET,KAKAO_REDIRECT_URI,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,GOOGLE_REDIRECT_URI,S3_BUCKET,S3_PUBLIC_BASE_URL,DOCKERHUB_USERNAME,IMAGE_TAG
          script: |
            IMAGE="$DOCKERHUB_USERNAME/team3-server:$IMAGE_TAG"
            docker pull "$IMAGE"
            docker stop team3-server || true
            docker rm team3-server || true
            docker run -d \
              --name team3-server \
              -p 8080:8080 \
              -e GEMINI_API_KEY="$GEMINI_API_KEY" \
              -e DB_HOST="$DB_HOST" \
              -e DB_PORT="$DB_PORT" \
              -e DB_NAME="$DB_NAME" \
              -e DB_USERNAME="$DB_USERNAME" \
              -e DB_PASSWORD="$DB_PASSWORD" \
              -e JWT_SECRET="$JWT_SECRET" \
              -e REDIS_HOST="$REDIS_HOST" \
              -e REDIS_PORT="$REDIS_PORT" \
              -e KAKAO_CLIENT_ID="$KAKAO_CLIENT_ID" \
              -e KAKAO_CLIENT_SECRET="$KAKAO_CLIENT_SECRET" \
              -e KAKAO_REDIRECT_URI="$KAKAO_REDIRECT_URI" \
              -e GOOGLE_CLIENT_ID="$GOOGLE_CLIENT_ID" \
              -e GOOGLE_CLIENT_SECRET="$GOOGLE_CLIENT_SECRET" \
              -e GOOGLE_REDIRECT_URI="$GOOGLE_REDIRECT_URI" \
              -e S3_BUCKET="$S3_BUCKET" \
              -e S3_PUBLIC_BASE_URL="$S3_PUBLIC_BASE_URL" \
              "$IMAGE"

      - name: Health check
        id: health
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            for i in $(seq 1 12); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/health || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "Health check passed (attempt $i)"
                exit 0
              fi
              echo "Attempt $i: status=$STATUS, retrying in 5s..."
              sleep 5
            done
            echo "Health check failed after 60s"
            exit 1

      - name: Notify Slack on success
        if: success()
        continue-on-error: true
        shell: bash
        run: |
          SLACK_USER_MAP='{"m-a-king":"U0AKAEF2K9U","1o18z":"U0AKQ6G8BT3","sevineleven":"U0AK6U2J62F"}'
          ACTOR="${{ github.actor }}"
          SLACK_ID=$(echo "$SLACK_USER_MAP" | jq -r --arg login "$ACTOR" '.[$login] // empty')
          ACTOR_MENTION="${SLACK_ID:+<@$SLACK_ID>}"
          ACTOR_MENTION="${ACTOR_MENTION:-$ACTOR}"

          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          TEXT=$(printf '✅ `${{ github.event.inputs.branch }}` → staging 배포 성공! ✅\n• 배포자: %s\n• <%s|워크플로우 로그>' \
            "$ACTOR_MENTION" "$RUN_URL")

          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            -H "Content-Type: application/json; charset=utf-8" \
            --data "$(jq -n --arg channel "${{ secrets.SLACK_CHANNEL_ID }}" --arg text "$TEXT" \
              '{channel:$channel,text:$text,unfurl_links:false,unfurl_media:false}')"

      - name: Notify Slack on failure
        if: failure()
        continue-on-error: true
        shell: bash
        run: |
          SLACK_USER_MAP='{"m-a-king":"U0AKAEF2K9U","1o18z":"U0AKQ6G8BT3","sevineleven":"U0AK6U2J62F"}'
          ACTOR="${{ github.actor }}"
          SLACK_ID=$(echo "$SLACK_USER_MAP" | jq -r --arg login "$ACTOR" '.[$login] // empty')
          ACTOR_MENTION="${SLACK_ID:+<@$SLACK_ID>}"
          ACTOR_MENTION="${ACTOR_MENTION:-$ACTOR}"

          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "${{ steps.build.outcome }}" = "failure" ]; then
            CAUSE="Gradle 빌드 실패 (Build JAR)"
          elif [ "${{ steps.docker_login.outcome }}" = "failure" ]; then
            CAUSE="Docker Hub 로그인 실패"
          elif [ "${{ steps.docker_push.outcome }}" = "failure" ]; then
            CAUSE="Docker 이미지 빌드/푸시 실패"
          elif [ "${{ steps.deploy.outcome }}" = "failure" ]; then
            CAUSE="EC2 배포 실패 (SSH/Docker)"
          elif [ "${{ steps.health.outcome }}" = "failure" ]; then
            CAUSE="헬스체크 실패 (서버 미응답)"
          else
            CAUSE="알 수 없음 (환경 설정 단계)"
          fi

          TEXT=$(printf '❌ `${{ github.event.inputs.branch }}` → staging 배포 실패! ❌\n• 배포자: %s\n• 원인: %s\n• <%s|워크플로우 로그 확인>' \
            "$ACTOR_MENTION" "$CAUSE" "$RUN_URL")

          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            -H "Content-Type: application/json; charset=utf-8" \
            --data "$(jq -n --arg channel "${{ secrets.SLACK_CHANNEL_ID }}" --arg text "$TEXT" \
              '{channel:$channel,text:$text,unfurl_links:false,unfurl_media:false}')"

name: Deploy to EC2

on:
  workflow_run:
    workflows: [CI]
    branches: [dev]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push')
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build JAR
        id: build
        run: ./gradlew bootJar --no-daemon

      - name: Login to Docker Hub
        id: docker_login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: docker_push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ci
          push: true
          platforms: linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/team3-server:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/team3-server:${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Deploy to EC2
        id: deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/team3-server:${{ github.event.workflow_run.head_sha || github.sha }}"
            docker pull "$IMAGE"

            # 구버전 team3-server 컨테이너 마이그레이션 (최초 1회)
            if docker ps --filter "name=team3-server" --filter "status=running" -q | grep -q .; then
              echo "  MIGRATE : team3-server → blue-green 슬롯으로 전환"
              docker stop team3-server || true
              docker rm team3-server || true
            fi

            # 현재 active 슬롯 감지
            if docker ps --filter "name=team3-blue" --filter "status=running" -q | grep -q .; then
              ACTIVE="blue" ACTIVE_PORT=8080 INACTIVE="green" INACTIVE_PORT=8081
            else
              ACTIVE="green" ACTIVE_PORT=8081 INACTIVE="blue" INACTIVE_PORT=8080
            fi
            echo "================================================"
            echo "  CURRENT : $ACTIVE (port $ACTIVE_PORT) [serving traffic]"
            echo "  DEPLOY  : $INACTIVE (port $INACTIVE_PORT) [new version]"
            echo "================================================"

            # 로그 백업 후 비활성 슬롯 정리
            mkdir -p /var/log/team3
            docker logs "team3-$INACTIVE" > /var/log/team3/team3-$INACTIVE-$(date +%Y%m%d-%H%M%S).log 2>&1 || true
            find /var/log/team3 -name "team3-*.log" -mtime +7 -delete || true
            docker stop "team3-$INACTIVE" || true
            docker rm "team3-$INACTIVE" || true

            # 새 버전 비활성 포트에 기동
            docker run -d \
              --name "team3-$INACTIVE" \
              -p "$INACTIVE_PORT:8080" \
              -e GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
              -e DB_HOST=${{ secrets.DB_HOST }} \
              -e DB_PORT=${{ secrets.DB_PORT }} \
              -e DB_NAME=${{ secrets.DB_NAME }} \
              -e DB_USERNAME=${{ secrets.DB_USERNAME }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              "$IMAGE"

      - name: Health check and switch
        id: health
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 비활성 슬롯 감지 (deploy 스텝과 반대)
            if docker ps --filter "name=team3-blue" --filter "status=running" -q | grep -q .; then
              ACTIVE="blue" ACTIVE_PORT=8080 INACTIVE="green" INACTIVE_PORT=8081
            else
              ACTIVE="green" ACTIVE_PORT=8081 INACTIVE="blue" INACTIVE_PORT=8080
            fi

            # 새로 뜬 컨테이너(INACTIVE) 헬스체크
            for i in $(seq 1 12); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:$INACTIVE_PORT/health || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "================================================"
                echo "  HEALTH CHECK PASSED on $INACTIVE (attempt $i)"
                echo "================================================"
                # Nginx upstream 전환
                echo "server localhost:$INACTIVE_PORT;" | sudo tee /etc/nginx/team3-upstream.conf
                sudo nginx -s reload
                echo "  SWITCHED : Nginx now → $INACTIVE (port $INACTIVE_PORT)"
                # 구버전 종료
                docker stop "team3-$ACTIVE" || true
                docker rm "team3-$ACTIVE" || true
                echo "  STOPPED  : $ACTIVE (port $ACTIVE_PORT)"
                echo "================================================"
                exit 0
              fi
              echo "Attempt $i: status=$STATUS, retrying in 5s..."
              sleep 5
            done
            echo "Health check failed — rolling back"
            docker stop "team3-$INACTIVE" || true
            docker rm "team3-$INACTIVE" || true
            exit 1

      - name: Notify Slack on success
        if: success()
        continue-on-error: true
        shell: bash
        run: |
          SLACK_USER_MAP='{"m-a-king":"U0AKAEF2K9U","1o18z":"U0AKQ6G8BT3","sevineleven":"U0AK6U2J62F"}'
          ACTOR="${{ github.actor }}"
          SLACK_ID=$(echo "$SLACK_USER_MAP" | jq -r --arg login "$ACTOR" '.[$login] // empty')
          ACTOR_MENTION="${SLACK_ID:+<@$SLACK_ID>}"
          ACTOR_MENTION="${ACTOR_MENTION:-$ACTOR}"

          SHORT_SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          COMMIT_URL="https://github.com/${{ github.repository }}/commit/${{ github.event.workflow_run.head_sha || github.sha }}"
          COMMIT_MSG=$(jq -r '(.workflow_run.head_commit.message // .head_commit.message // "")' "$GITHUB_EVENT_PATH" | head -n 1)
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          TEXT=$(printf '✅ `${{ github.ref_name }}` 배포 성공!  ✅\n• 배포자: %s\n• 커밋: <%s|%s>  %s\n• <%s|워크플로우 로그>' \
            "$ACTOR_MENTION" "$COMMIT_URL" "$SHORT_SHA" "$COMMIT_MSG" "$RUN_URL")

          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            -H "Content-Type: application/json; charset=utf-8" \
            --data "$(jq -n --arg channel "${{ secrets.SLACK_CHANNEL_ID }}" --arg text "$TEXT" \
              '{channel:$channel,text:$text,unfurl_links:false,unfurl_media:false}')"

      - name: Notify Slack on failure
        if: failure()
        continue-on-error: true
        shell: bash
        run: |
          SLACK_USER_MAP='{"m-a-king":"U0AKAEF2K9U","1o18z":"U0AKQ6G8BT3","sevineleven":"U0AK6U2J62F"}'
          ACTOR="${{ github.actor }}"
          SLACK_ID=$(echo "$SLACK_USER_MAP" | jq -r --arg login "$ACTOR" '.[$login] // empty')
          ACTOR_MENTION="${SLACK_ID:+<@$SLACK_ID>}"
          ACTOR_MENTION="${ACTOR_MENTION:-$ACTOR}"

          SHORT_SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          COMMIT_URL="https://github.com/${{ github.repository }}/commit/${{ github.event.workflow_run.head_sha || github.sha }}"
          COMMIT_MSG=$(jq -r '(.workflow_run.head_commit.message // .head_commit.message // "")' "$GITHUB_EVENT_PATH" | head -n 1)
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "${{ steps.build.outcome }}" = "failure" ]; then
            CAUSE="Gradle 빌드 실패 (Build JAR)"
          elif [ "${{ steps.docker_login.outcome }}" = "failure" ]; then
            CAUSE="Docker Hub 로그인 실패"
          elif [ "${{ steps.docker_push.outcome }}" = "failure" ]; then
            CAUSE="Docker 이미지 빌드/푸시 실패"
          elif [ "${{ steps.deploy.outcome }}" = "failure" ]; then
            CAUSE="EC2 배포 실패 (SSH/Docker)"
          elif [ "${{ steps.health.outcome }}" = "failure" ]; then
            CAUSE="헬스체크 실패 (서버 미응답)"
          else
            CAUSE="알 수 없음 (환경 설정 단계)"
          fi

          TEXT=$(printf '❌ `${{ github.ref_name }}` 배포 실패! ❌\n• 배포자: %s\n• 커밋: <%s|%s>  %s\n• 원인: %s\n• <%s|워크플로우 로그 확인>' \
            "$ACTOR_MENTION" "$COMMIT_URL" "$SHORT_SHA" "$COMMIT_MSG" "$CAUSE" "$RUN_URL")

          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            -H "Content-Type: application/json; charset=utf-8" \
            --data "$(jq -n --arg channel "${{ secrets.SLACK_CHANNEL_ID }}" --arg text "$TEXT" \
              '{channel:$channel,text:$text,unfurl_links:false,unfurl_media:false}')"

name: Deploy to EC2

on:
  workflow_run:
    workflows: [CI]
    branches: [dev]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-ec2-dev
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push')
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build JAR
        id: build
        run: ./gradlew bootJar --no-daemon

      - name: Login to Docker Hub
        id: docker_login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: docker_push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ci
          push: true
          platforms: linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/team3-server:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/team3-server:${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Upload nginx config
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "infra/nginx/api.depromeet18team3.cloud.conf"
          target: "/tmp/team3-nginx"
          strip_components: 2

      - name: Apply nginx config
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            SRC=/tmp/team3-nginx/api.depromeet18team3.cloud.conf
            DST=/etc/nginx/sites-available/api.depromeet18team3.cloud
            # api conf 가 include 하는 team3-upstream.conf 가 없으면(새 인스턴스) nginx -t 가 깨진다.
            # blue-green 전환 전이라도 include 대상이 존재하도록 기본값(8080)으로 초기화한다.
            # 실제 active 포트 전환은 blue-green(Health check)이 담당하므로 이미 있으면 건드리지 않는다.
            [ -f /etc/nginx/team3-upstream.conf ] || echo "server localhost:8080;" | sudo tee /etc/nginx/team3-upstream.conf
            # 현재 설정 백업 후 교체. nginx -t 검증 실패 시 이전 설정으로 롤백하고 배포를 중단한다.
            sudo cp "$DST" "${DST}.bak" 2>/dev/null || true
            sudo cp "$SRC" "$DST"
            if sudo nginx -t; then
              sudo nginx -s reload
              echo "nginx config 적용 + reload 완료"
            else
              echo "nginx -t 실패 — 이전 설정으로 롤백하고 중단"
              sudo cp "${DST}.bak" "$DST" 2>/dev/null || true
              exit 1
            fi

      - name: Upload provisioning script
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "infra/scripts/provision-runtime.sh"
          target: "/tmp/team3-provision"
          strip_components: 2

      - name: Upload Alloy config
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "infra/alloy/config.alloy"
          target: "/tmp/team3-alloy"
          strip_components: 2

      - name: Provision runtime (swap·redis·nginx·alloy)
        uses: appleboy/ssh-action@v1
        env:
          # Alloy 가 Grafana Cloud 로 remote-write 할 자격증명. 미등록(빈 값)이면 provision-runtime.sh 가
          # Alloy 기동을 skip 한다. token 1개를 metrics·logs 가 공유, URL·USER 는 Prometheus/Loki 각각.
          GRAFANA_METRICS_URL: ${{ secrets.GRAFANA_METRICS_URL }}
          GRAFANA_METRICS_USER: ${{ secrets.GRAFANA_METRICS_USER }}
          GRAFANA_LOGS_URL: ${{ secrets.GRAFANA_LOGS_URL }}
          GRAFANA_LOGS_USER: ${{ secrets.GRAFANA_LOGS_USER }}
          GRAFANA_CLOUD_TOKEN: ${{ secrets.GRAFANA_CLOUD_TOKEN }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # appleboy/ssh-action 이 envs 목록을 SSH 세션에 export 하므로, script 가 실행하는
          # provision-runtime.sh 자식 프로세스도 이 값들을 상속한다.
          envs: GRAFANA_METRICS_URL,GRAFANA_METRICS_USER,GRAFANA_LOGS_URL,GRAFANA_LOGS_USER,GRAFANA_CLOUD_TOKEN
          script: |
            chmod +x /tmp/team3-provision/provision-runtime.sh
            /tmp/team3-provision/provision-runtime.sh

      - name: Deploy to EC2
        id: deploy
        uses: appleboy/ssh-action@v1
        env:
          # secrets 를 step env 로 한 번 거쳐 SSH 세션으로 안전하게 전달한다.
          # docker run 명령 문자열에 직접 ${{ secrets.X }} 를 박으면 값에 $ / " / 공백 같은
          # 특수문자가 있을 때 쉘이 다시 해석하면서 값이 손상될 수 있다.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          KAKAO_CLIENT_ID: ${{ secrets.KAKAO_CLIENT_ID }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          KAKAO_REDIRECT_URI: ${{ secrets.KAKAO_REDIRECT_URI }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI: ${{ secrets.GOOGLE_REDIRECT_URI }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_CLIENT_ID: ${{ secrets.APPLE_CLIENT_ID }}
          APPLE_BUNDLE_ID: ${{ secrets.APPLE_BUNDLE_ID }}
          APPLE_PRIVATE_KEY: ${{ secrets.APPLE_PRIVATE_KEY }}
          APPLE_REDIRECT_URI: ${{ secrets.APPLE_REDIRECT_URI }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_PUBLIC_BASE_URL: ${{ secrets.S3_PUBLIC_BASE_URL }}
          # admin 백오피스(dev 전용). ENABLED 만 평문(민감정보 아님)으로 두어 "dev 에 켰다"는 의도를 드러내고,
          # 자격증명(ID·PW)은 Secrets 로만 주입해 워크플로 파일·git 히스토리에 평문이 남지 않게 한다.
          ADMIN_ENABLED: "true"
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GEMINI_API_KEY,DB_HOST,DB_PORT,DB_NAME,DB_USERNAME,DB_PASSWORD,JWT_SECRET,REDIS_HOST,REDIS_PORT,KAKAO_CLIENT_ID,KAKAO_CLIENT_SECRET,KAKAO_REDIRECT_URI,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,GOOGLE_REDIRECT_URI,APPLE_TEAM_ID,APPLE_KEY_ID,APPLE_CLIENT_ID,APPLE_BUNDLE_ID,APPLE_PRIVATE_KEY,APPLE_REDIRECT_URI,S3_BUCKET,S3_PUBLIC_BASE_URL,ADMIN_ENABLED,ADMIN_USERNAME,ADMIN_PASSWORD,DOCKERHUB_USERNAME,IMAGE_TAG
          script: |
            IMAGE="$DOCKERHUB_USERNAME/team3-server:$IMAGE_TAG"

            # 옛 배포 이미지가 쌓여 EC2 디스크가 차면 containerd 가 새 이미지를 못 받아 배포가 실패한다(#336).
            # pull 전에 컨테이너 미참조 이미지를 정리해 누적을 막고, 이미 디스크가 찬 상태의 deadlock 도 깬다.
            # 실행중 컨테이너(blue/green·alloy·redis)의 이미지와 볼륨은 보존된다.
            # -af 로 전부 정리한다(시간 필터 X): 롤백은 "실행중 active 컨테이너 유지"라 옛 이미지를 재사용하지 않고,
            # dev 는 배포가 잦아 --filter "until=72h" 류로 두면 디스크가 다시 찬다. 다중 버전 보존이 필요해지면 그때 제한한다.
            docker image prune -af || true
            df -h / | tail -1

            docker pull "$IMAGE"

            # team3-upstream.conf를 source of truth로 현재 서빙 포트 결정
            # (없으면 8080 기본값 — team3-server가 8080에서 서비스 중인 초기 상태)
            if [ -f /etc/nginx/team3-upstream.conf ]; then
              ACTIVE_PORT=$(grep -oP '\d+' /etc/nginx/team3-upstream.conf | head -1)
            else
              ACTIVE_PORT=8080
              echo "server localhost:8080;" | sudo tee /etc/nginx/team3-upstream.conf
            fi
            if [ "$ACTIVE_PORT" = "8080" ]; then
              ACTIVE="blue" INACTIVE="green" INACTIVE_PORT=8081
            else
              ACTIVE="green" INACTIVE="blue" INACTIVE_PORT=8080
            fi
            echo "================================================"
            echo "  CURRENT : $ACTIVE (port $ACTIVE_PORT) [serving traffic]"
            echo "  DEPLOY  : $INACTIVE (port $INACTIVE_PORT) [new version]"
            echo "================================================"

            # 로그 백업 후 비활성 슬롯 정리
            mkdir -p /var/log/team3
            docker logs "team3-$INACTIVE" > /var/log/team3/team3-$INACTIVE-$(date +%Y%m%d-%H%M%S).log 2>&1 || true
            find /var/log/team3 -name "team3-*.log" -mtime +7 -delete || true
            docker stop "team3-$INACTIVE" || true
            docker rm "team3-$INACTIVE" || true

            # 새 버전 비활성 포트에 기동.
            # -p 를 127.0.0.1 에 바인딩해 호스트 공인 IP(EIP)로의 직접 접근을 막는다. nginx(호스트 프로세스)와
            # health check 는 localhost 로 접근하므로 영향 없고, actuator/prometheus 가 SG ingress 설정과 무관하게
            # 외부에서 직접 scrape 되는 우회 경로를 구조적으로 차단한다 (nginx /actuator 차단의 보강).
            # 주의: 별도 PR 의 Grafana Alloy 는 같은 호스트의 컨테이너이므로 --network host 로 띄워 localhost 를 scrape 해야 한다
            #       (redis 가 쓰는 172.17.0.1 bridge 바인딩 방식으로는 127.0.0.1 바인딩 포트에 닿지 못한다).
            docker run -d \
              --name "team3-$INACTIVE" \
              -p "127.0.0.1:$INACTIVE_PORT:8080" \
              -e JAVA_TOOL_OPTIONS="-Xmx256m -Xms64m" \
              -e GEMINI_API_KEY="$GEMINI_API_KEY" \
              -e DB_HOST="$DB_HOST" \
              -e DB_PORT="$DB_PORT" \
              -e DB_NAME="$DB_NAME" \
              -e DB_USERNAME="$DB_USERNAME" \
              -e DB_PASSWORD="$DB_PASSWORD" \
              -e JWT_SECRET="$JWT_SECRET" \
              -e REDIS_HOST="$REDIS_HOST" \
              -e REDIS_PORT="$REDIS_PORT" \
              -e KAKAO_CLIENT_ID="$KAKAO_CLIENT_ID" \
              -e KAKAO_CLIENT_SECRET="$KAKAO_CLIENT_SECRET" \
              -e KAKAO_REDIRECT_URI="$KAKAO_REDIRECT_URI" \
              -e GOOGLE_CLIENT_ID="$GOOGLE_CLIENT_ID" \
              -e GOOGLE_CLIENT_SECRET="$GOOGLE_CLIENT_SECRET" \
              -e GOOGLE_REDIRECT_URI="$GOOGLE_REDIRECT_URI" \
              -e APPLE_TEAM_ID="$APPLE_TEAM_ID" \
              -e APPLE_KEY_ID="$APPLE_KEY_ID" \
              -e APPLE_CLIENT_ID="$APPLE_CLIENT_ID" \
              -e APPLE_BUNDLE_ID="$APPLE_BUNDLE_ID" \
              -e APPLE_PRIVATE_KEY="$APPLE_PRIVATE_KEY" \
              -e APPLE_REDIRECT_URI="$APPLE_REDIRECT_URI" \
              -e S3_BUCKET="$S3_BUCKET" \
              -e S3_PUBLIC_BASE_URL="$S3_PUBLIC_BASE_URL" \
              -e ADMIN_ENABLED="$ADMIN_ENABLED" \
              -e ADMIN_USERNAME="$ADMIN_USERNAME" \
              -e ADMIN_PASSWORD="$ADMIN_PASSWORD" \
              "$IMAGE"

      - name: Health check and switch
        id: health
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # team3-upstream.conf에서 현재 서빙 포트 읽기 (source of truth)
            ACTIVE_PORT=$(grep -oP '\d+' /etc/nginx/team3-upstream.conf | head -1)
            if [ "$ACTIVE_PORT" = "8080" ]; then
              ACTIVE="blue" INACTIVE="green" INACTIVE_PORT=8081
            else
              ACTIVE="green" INACTIVE="blue" INACTIVE_PORT=8080
            fi

            # 새로 뜬 컨테이너(INACTIVE) 헬스체크
            for i in $(seq 1 12); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:$INACTIVE_PORT/health || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "================================================"
                echo "  HEALTH CHECK PASSED on $INACTIVE (attempt $i)"
                echo "================================================"
                # Nginx upstream 전환
                echo "server localhost:$INACTIVE_PORT;" | sudo tee /etc/nginx/team3-upstream.conf
                sudo nginx -s reload
                echo "  SWITCHED : Nginx now → $INACTIVE (port $INACTIVE_PORT)"
                # 구버전 종료 (team3-server 마이그레이션 포함)
                docker stop "team3-$ACTIVE" team3-server 2>/dev/null || true
                docker rm "team3-$ACTIVE" team3-server 2>/dev/null || true
                echo "  STOPPED  : $ACTIVE (port $ACTIVE_PORT)"
                echo "================================================"
                exit 0
              fi
              echo "Attempt $i: status=$STATUS, retrying in 5s..."
              sleep 5
            done
            echo "Health check failed — rolling back"
            docker stop "team3-$INACTIVE" || true
            docker rm "team3-$INACTIVE" || true
            exit 1

      - name: Write deployment summary
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          SHORT_SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          COMMIT_URL="https://github.com/${{ github.repository }}/commit/${{ github.event.workflow_run.head_sha || github.sha }}"

          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/ec2_key && chmod 600 /tmp/ec2_key
          ACTIVE_PORT=$(ssh -i /tmp/ec2_key -o StrictHostKeyChecking=no \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            'grep -oP "\\d+" /etc/nginx/team3-upstream.conf 2>/dev/null | head -1' 2>/dev/null || echo "")
          rm -f /tmp/ec2_key

          if [ "$ACTIVE_PORT" = "8080" ]; then
            NOW="🔵 blue (8080)"
          elif [ "$ACTIVE_PORT" = "8081" ]; then
            NOW="🟢 green (8081)"
          else
            NOW="알 수 없음"
          fi

          if [ "${{ steps.health.outcome }}" = "success" ]; then
            STATUS="✅ 성공"
          elif [ "${{ steps.health.outcome }}" = "failure" ]; then
            STATUS="❌ 실패 (헬스체크)"
          elif [ "${{ steps.deploy.outcome }}" = "failure" ]; then
            STATUS="❌ 실패 (EC2 배포)"
          elif [ "${{ steps.docker_push.outcome }}" = "failure" ]; then
            STATUS="❌ 실패 (Docker 푸시)"
          elif [ "${{ steps.build.outcome }}" = "failure" ]; then
            STATUS="❌ 실패 (Gradle 빌드)"
          else
            STATUS="⚠️ 알 수 없음"
          fi

          {
            echo "## 배포 결과: $STATUS"
            echo ""
            echo "| 항목 | 값 |"
            echo "|------|-----|"
            echo "| 커밋 | [\`$SHORT_SHA\`]($COMMIT_URL) |"
            echo "| 현재 활성 슬롯 | $NOW |"
            echo "| Gradle 빌드 | ${{ steps.build.outcome }} |"
            echo "| Docker 푸시 | ${{ steps.docker_push.outcome }} |"
            echo "| EC2 배포 | ${{ steps.deploy.outcome }} |"
            echo "| 헬스체크 & 전환 | ${{ steps.health.outcome }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Notify Slack on success
        if: success()
        continue-on-error: true
        shell: bash
        run: |
          SLACK_USER_MAP='{"m-a-king":"U0AKAEF2K9U","1o18z":"U0AKQ6G8BT3","sevineleven":"U0AK6U2J62F"}'
          ACTOR="${{ github.actor }}"
          SLACK_ID=$(echo "$SLACK_USER_MAP" | jq -r --arg login "$ACTOR" '.[$login] // empty')
          ACTOR_MENTION="${SLACK_ID:+<@$SLACK_ID>}"
          ACTOR_MENTION="${ACTOR_MENTION:-$ACTOR}"

          SHORT_SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          COMMIT_URL="https://github.com/${{ github.repository }}/commit/${{ github.event.workflow_run.head_sha || github.sha }}"
          COMMIT_MSG=$(jq -r '(.workflow_run.head_commit.message // .head_commit.message // "")' "$GITHUB_EVENT_PATH" | head -n 1)
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          TEXT=$(printf '✅ `${{ github.ref_name }}` 배포 성공!  ✅\n• 배포자: %s\n• 커밋: <%s|%s>  %s\n• <%s|워크플로우 로그>' \
            "$ACTOR_MENTION" "$COMMIT_URL" "$SHORT_SHA" "$COMMIT_MSG" "$RUN_URL")

          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            -H "Content-Type: application/json; charset=utf-8" \
            --data "$(jq -n --arg channel "${{ secrets.SLACK_CHANNEL_ID }}" --arg text "$TEXT" \
              '{channel:$channel,text:$text,unfurl_links:false,unfurl_media:false}')"

      - name: Notify Slack on failure
        if: failure()
        continue-on-error: true
        shell: bash
        run: |
          SLACK_USER_MAP='{"m-a-king":"U0AKAEF2K9U","1o18z":"U0AKQ6G8BT3","sevineleven":"U0AK6U2J62F"}'
          ACTOR="${{ github.actor }}"
          SLACK_ID=$(echo "$SLACK_USER_MAP" | jq -r --arg login "$ACTOR" '.[$login] // empty')
          ACTOR_MENTION="${SLACK_ID:+<@$SLACK_ID>}"
          ACTOR_MENTION="${ACTOR_MENTION:-$ACTOR}"

          SHORT_SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          COMMIT_URL="https://github.com/${{ github.repository }}/commit/${{ github.event.workflow_run.head_sha || github.sha }}"
          COMMIT_MSG=$(jq -r '(.workflow_run.head_commit.message // .head_commit.message // "")' "$GITHUB_EVENT_PATH" | head -n 1)
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "${{ steps.build.outcome }}" = "failure" ]; then
            CAUSE="Gradle 빌드 실패 (Build JAR)"
          elif [ "${{ steps.docker_login.outcome }}" = "failure" ]; then
            CAUSE="Docker Hub 로그인 실패"
          elif [ "${{ steps.docker_push.outcome }}" = "failure" ]; then
            CAUSE="Docker 이미지 빌드/푸시 실패"
          elif [ "${{ steps.deploy.outcome }}" = "failure" ]; then
            CAUSE="EC2 배포 실패 (SSH/Docker)"
          elif [ "${{ steps.health.outcome }}" = "failure" ]; then
            CAUSE="헬스체크 실패 (서버 미응답)"
          else
            CAUSE="알 수 없음 (환경 설정 단계)"
          fi

          TEXT=$(printf '❌ `${{ github.ref_name }}` 배포 실패! ❌\n• 배포자: %s\n• 커밋: <%s|%s>  %s\n• 원인: %s\n• <%s|워크플로우 로그 확인>' \
            "$ACTOR_MENTION" "$COMMIT_URL" "$SHORT_SHA" "$COMMIT_MSG" "$CAUSE" "$RUN_URL")

          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            -H "Content-Type: application/json; charset=utf-8" \
            --data "$(jq -n --arg channel "${{ secrets.SLACK_CHANNEL_ID }}" --arg text "$TEXT" \
              '{channel:$channel,text:$text,unfurl_links:false,unfurl_media:false}')"

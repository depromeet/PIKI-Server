name: Epic Progress Tracker

on:
  issues:
    types: [closed]

jobs:
  update-epic:
    runs-on: ubuntu-latest
    # epic 자신이 닫힐 때는 실행하지 않음
    if: "!contains(toJson(github.event.issue.labels.*.name), 'epic')"
    steps:
      - name: Comment Progress on Parent Epic
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          # 상위 Epic 번호 파싱
          EPIC_NUM=$(echo "$ISSUE_BODY" | grep -A3 "^### 상위 Epic" | grep -oE "#[0-9]+" | head -1 | tr -d '#')

          if [[ -z "$EPIC_NUM" ]]; then
            echo "No parent epic found"
            exit 0
          fi

          # 후보 이슈 전체 조회 후 본문을 직접 파싱
          # (Search API는 본문 어디든 #N이 언급되면 매칭되어 false positive 발생)
          CANDIDATES=$(gh issue list \
            --repo depromeet/PIKI-Server \
            --state all \
            --limit 500 \
            --json number,state,body,labels)

          # ### 상위 Epic 섹션에 정확히 #EPIC_NUM이 기재된 이슈만 집계
          PATTERN="### 상위 Epic\\s+#${EPIC_NUM}\\b"

          TOTAL=$(echo "$CANDIDATES" | jq --arg pat "$PATTERN" \
            '[.[] | select(
              (.labels | map(.name) | index("epic") | not) and
              (.body // "" | test($pat))
            )] | length')

          CLOSED=$(echo "$CANDIDATES" | jq --arg pat "$PATTERN" \
            '[.[] | select(
              (.labels | map(.name) | index("epic") | not) and
              (.state == "CLOSED") and
              (.body // "" | test($pat))
            )] | length')

          if [[ "$TOTAL" -eq 0 ]]; then
            exit 0
          fi

          if [[ "$CLOSED" -eq "$TOTAL" ]]; then
            gh issue comment "$EPIC_NUM" \
              --body "🎉 모든 이슈가 완료되었습니다! ($CLOSED/$TOTAL)" \
              --repo depromeet/PIKI-Server
          else
            gh issue comment "$EPIC_NUM" \
              --body "✅ 이슈 #$ISSUE_NUMBER 완료 — 진행률: **$CLOSED / $TOTAL**" \
              --repo depromeet/PIKI-Server
          fi

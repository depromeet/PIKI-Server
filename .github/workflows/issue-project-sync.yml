name: Issue Automation

on:
  issues:
    types: [opened]

jobs:
  add-to-project-and-sync-dates:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Add to Project & Set Dates
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          ISSUE_NODE_ID: ${{ github.event.issue.node_id }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # 프로젝트 ID 조회
          PROJECT_ID=$(gh api graphql -f query='{
            organization(login: "depromeet") {
              projectV2(number: 99) { id }
            }
          }' --jq '.data.organization.projectV2.id')

          # 이슈를 프로젝트에 추가하고 item ID 획득
          ITEM_ID=$(gh api graphql \
            -f query='mutation($pid:ID!,$cid:ID!) {
              addProjectV2ItemById(input:{projectId:$pid,contentId:$cid}) {
                item { id }
              }
            }' \
            -f pid="$PROJECT_ID" \
            -f cid="$ISSUE_NODE_ID" \
            --jq '.data.addProjectV2ItemById.item.id')

          echo "Added to project. Item ID: $ITEM_ID"

          # 프로젝트 필드 ID 조회 (날짜, 우선순위)
          FIELDS=$(gh api graphql -f query='{
            organization(login: "depromeet") {
              projectV2(number: 99) {
                fields(first: 30) {
                  nodes {
                    ... on ProjectV2Field { id name dataType }
                    ... on ProjectV2SingleSelectField { id name options { id name } }
                  }
                }
              }
            }
          }' --jq '.data.organization.projectV2.fields.nodes')

          START_FIELD=$(echo "$FIELDS" | jq -r '.[] | select(.name == "Start date" and .dataType == "DATE") | .id')
          DUE_FIELD=$(echo "$FIELDS" | jq -r '.[] | select(.name == "Target date" and .dataType == "DATE") | .id')
          PRIORITY_FIELD_ID=$(echo "$FIELDS" | jq -r '.[] | select(.name == "Priority") | .id')
          echo "START_FIELD=$START_FIELD DUE_FIELD=$DUE_FIELD PRIORITY_FIELD_ID=$PRIORITY_FIELD_ID"

          # 이슈 본문에서 날짜 파싱 (MMDD → YYYY-MM-DD 자동 변환, YYYY-MM-DD / YYYYMMDD도 허용)
          CURRENT_YEAR=$(date +%Y)
          normalize_date() {
            local raw
            raw=$(echo "$1" | grep -A3 "^### $2" | grep -E "^[0-9]+" | head -1 | tr -d '[:space:]')
            if [[ "$raw" =~ ^([0-9]{4})-([0-9]{2})-([0-9]{2})$ ]]; then
              echo "$raw"
            elif [[ "$raw" =~ ^([0-9]{4})([0-9]{2})([0-9]{2})$ ]]; then
              echo "${BASH_REMATCH[1]}-${BASH_REMATCH[2]}-${BASH_REMATCH[3]}"
            elif [[ "$raw" =~ ^([0-9]{2})([0-9]{2})$ ]]; then
              echo "${CURRENT_YEAR}-${BASH_REMATCH[1]}-${BASH_REMATCH[2]}"
            fi
          }
          START_DATE=$(normalize_date "$ISSUE_BODY" "시작일")
          DUE_DATE=$(normalize_date "$ISSUE_BODY" "마감일")
          echo "START_DATE=$START_DATE DUE_DATE=$DUE_DATE"

          # 우선순위 파싱
          PRIORITY_LABEL=$(echo "$ISSUE_BODY" | grep -A3 "^### 우선순위" | grep -vE "^###|^$" | head -1 | tr -d '[:space:]')
          PRIORITY_OPTION_ID=$(echo "$FIELDS" | jq -r --arg p "$PRIORITY_LABEL" '.[] | select(.name == "Priority") | .options[]? | select(.name == $p) | .id')
          echo "PRIORITY=$PRIORITY_LABEL PRIORITY_OPTION_ID=$PRIORITY_OPTION_ID"

          update_field() {
            local fid=$1 val_key=$2 val=$3
            [[ -z "$fid" || -z "$val" ]] && return
            gh api graphql \
              -f query="mutation(\$pid:ID!,\$iid:ID!,\$fid:ID!,\$val:$4!) {
                updateProjectV2ItemFieldValue(input:{projectId:\$pid,itemId:\$iid,fieldId:\$fid,value:{$val_key:\$val}}) {
                  projectV2Item { id }
                }
              }" \
              -f pid="$PROJECT_ID" -f iid="$ITEM_ID" -f fid="$fid" -f val="$val"
          }

          update_field "$START_FIELD"        "date"                   "$START_DATE"          "Date"
          update_field "$DUE_FIELD"          "date"                   "$DUE_DATE"            "Date"
          update_field "$PRIORITY_FIELD_ID"  "singleSelectOptionId"   "$PRIORITY_OPTION_ID"  "String"

          # bash -e 환경에서 `[[ ]] && echo` 는 조건이 false 일 때 exit 1 을 유발하므로 if/fi 사용
          if [[ -n "$START_DATE" ]];        then echo "Start date set: $START_DATE"; fi
          if [[ -n "$DUE_DATE" ]];          then echo "Due date set: $DUE_DATE"; fi
          if [[ -n "$PRIORITY_OPTION_ID" ]]; then echo "Priority set: $PRIORITY_LABEL"; fi

  check-assignee:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Auto-assign creator if no assignee
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ASSIGNEES: ${{ toJson(github.event.issue.assignees) }}
          CREATOR: ${{ github.event.issue.user.login }}
        run: |
          if echo "$ASSIGNEES" | jq -e 'length == 0' > /dev/null; then
            gh issue edit "$ISSUE_NUMBER" \
              --add-assignee "$CREATOR" \
              --repo depromeet/18th-team3-server
            echo "Auto-assigned to creator: $CREATOR"
          fi

name: Slack PR Bot

on:
  pull_request:
    types:
      - opened
      - review_requested
      - review_request_removed
      - edited
      - synchronize
      - closed
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  issues: write

# 레이스 방지용 concurrency
concurrency:
  group: slack-pr-bot-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: false

jobs:
  notify-slack:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      SLACK_USER_MAP: '{"m-a-king":"U0AKAEF2K9U","1o18z":"U0AKQ6G8BT3","sevineleven":"U0AK6U2J62F"}'

    steps:
      - name: Extract PR data
        id: pr
        shell: bash
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          AUTHOR="${{ github.event.pull_request.user.login }}"
          ACTION="${{ github.event.action }}"
          MERGED="${{ github.event.pull_request.merged }}"
          IS_DRAFT="${{ github.event.pull_request.draft }}"
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          HEAD_REF="${{ github.event.pull_request.head.ref }}"
          PR_BODY=$(jq -r '.pull_request.body // ""' "$GITHUB_EVENT_PATH")

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

          {
            echo "pr_title<<EOF"
            echo "$PR_TITLE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          AUTHOR_SLACK_ID=$(echo "$SLACK_USER_MAP" | jq -r --arg login "$AUTHOR" '.[$login] // empty')
          
          if [ -n "$AUTHOR_SLACK_ID" ]; then
            AUTHOR_MENTION="<@$AUTHOR_SLACK_ID>"
          else
            AUTHOR_MENTION="$AUTHOR"
          fi
          
          echo "author=$AUTHOR_MENTION" >> "$GITHUB_OUTPUT"
          echo "action=$ACTION" >> "$GITHUB_OUTPUT"
          echo "merged=$MERGED" >> "$GITHUB_OUTPUT"
          echo "is_draft=$IS_DRAFT" >> "$GITHUB_OUTPUT"
          echo "base_ref=$BASE_REF" >> "$GITHUB_OUTPUT"
          echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"

          {
            echo "pr_body<<EOF"
            echo "$PR_BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Find existing Slack ts from PR comments
        id: find_ts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          COMMENTS=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ steps.pr.outputs.pr_number }}/comments")

          BODY=$(echo "$COMMENTS" | jq -r '.[] | select(.body | contains("slack-pr-bot")) | .body' | tail -n 1)

          TS=$(echo "$BODY" | sed -n 's/.*"ts":"\([^"]*\)".*/\1/p')
          CHANNEL=$(echo "$BODY" | sed -n 's/.*"channel":"\([^"]*\)".*/\1/p')
          INITIAL_REVIEWERS=$(echo "$BODY" | grep -oP '"initial_reviewers":\K\[[^\]]*\]' || echo "[]")

          echo "ts=$TS" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "initial_reviewers=$INITIAL_REVIEWERS" >> "$GITHUB_OUTPUT"

      - name: Post parent message
        if: steps.find_ts.outputs.ts == '' && github.event.action == 'opened' && github.event.pull_request.draft == false
        id: post_parent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          mention_slack_user() {
            local github_id="$1"
            local slack_id
            slack_id=$(echo "$SLACK_USER_MAP" | jq -r --arg id "$github_id" '.[$id] // empty')

            if [ -n "$slack_id" ]; then
              echo "<@$slack_id>"
            else
              echo "@$github_id"
            fi
          }

          build_reviewer_text() {
            local reviewers
            local reviewer_text
            local user_mention

            reviewers=$(jq -r '.pull_request.requested_reviewers[]?.login' "$GITHUB_EVENT_PATH")
            reviewer_text=""

            if [ -z "$reviewers" ]; then
              echo "없음"
              return
            fi

            while IFS= read -r reviewer; do
              [ -z "$reviewer" ] && continue
              user_mention=$(mention_slack_user "$reviewer")

              if [ -z "$reviewer_text" ]; then
                reviewer_text="$user_mention"
              else
                reviewer_text="$reviewer_text, $user_mention"
              fi
            done <<< "$reviewers"

            [ -z "$reviewer_text" ] && reviewer_text="없음"
            echo "$reviewer_text"
          }

          build_issue_text() {
            local pr_body="$1"
            local issues
            local issue_text
            local num
            local res
            local state
            local emoji
            local link
            local line

            issues=$(echo "$pr_body" | grep -oiE '\bclose[sd]?[[:space:]]+#[0-9]+' | grep -oE '#[0-9]+' | sort -u || true)
            issue_text=""

            if [ -z "$issues" ]; then
              echo "없음"
              return
            fi

            while IFS= read -r issue; do
              [ -z "$issue" ] && continue
              num=$(echo "$issue" | tr -d '#')

              res=$(curl -s \
                -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${{ github.repository }}/issues/$num")

              state=$(echo "$res" | jq -r '.state // "unknown"')

              if [ "$state" = "open" ]; then
                emoji="🟢"
              elif [ "$state" = "closed" ]; then
                emoji="⚫"
              else
                emoji="❓"
              fi

              link="https://github.com/${{ github.repository }}/issues/$num"
              line="$emoji <$link|#$num>"

              if [ -z "$issue_text" ]; then
                issue_text="$line"
              else
                issue_text=$(printf "%s\n%s" "$issue_text" "$line")
              fi
            done <<< "$issues"

            [ -z "$issue_text" ] && issue_text="없음"
            echo "$issue_text"
          }

          build_summary() {
            local pr_body="$1"
            printf '%s\n' "$pr_body" | awk '
              BEGIN { in_task=0; n=0; out="" }
              /^##/ {
                if (in_task == 1) exit
                r = $0
                sub(/^##[[:space:]]+/, "", r)
                ok = (match(r, /^[Tt][Aa][Ss][Kk]([^A-Za-z]|$)/) || match(r, /[[:space:]][Tt][Aa][Ss][Kk]([^A-Za-z]|$)/))
                if (ok) { in_task=1; next }
                next
              }
              in_task == 1 && /^##/ { exit }
              in_task == 1 {
                s = $0
                sub(/^[[:space:]]+/, "", s)
                if (s ~ /^>/) next
                if (s ~ /^-[[:space:]]*\[[[:space:]xX]\]/) next
                if (s ~ /^-[[:space:]]+/) {
                  sub(/^-[[:space:]]+/, "", s)
                  if (length(s) > 0) {
                    if (n++ > 0) out = out "\n"
                    out = out "• " s
                  }
                }
              }
              END {
                if (n > 0) print out
                else print "요약 없음"
              }
            '
          }

          PR_BODY=$(jq -r '.pull_request.body // ""' "$GITHUB_EVENT_PATH")
          REVIEWER_TEXT=$(build_reviewer_text)
          ISSUE_TEXT=$(build_issue_text "$PR_BODY")
          SUMMARY=$(build_summary "$PR_BODY")

          TITLE_LINK="<${{ steps.pr.outputs.pr_url }}|#${{ steps.pr.outputs.pr_number }} ${{ steps.pr.outputs.pr_title }}>"

          TEXT=$(cat <<EOF
          [PR] $TITLE_LINK
          
          
          🔥 연관 이슈
          $ISSUE_TEXT


          📝 작업 요약
          $SUMMARY


          *Author*: ${{ steps.pr.outputs.author }}
          *branch*: ${{ steps.pr.outputs.head_ref }} -> ${{ steps.pr.outputs.base_ref }}
          *reviewer*: $REVIEWER_TEXT
          EOF
          )

          RESP=$(curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            -H "Content-Type: application/json; charset=utf-8" \
            --data "$(jq -n \
              --arg channel "${{ secrets.SLACK_CHANNEL_ID }}" \
              --arg text "$TEXT" \
              '{channel:$channel,text:$text,unfurl_links:false,unfurl_media:false}')")

          OK=$(echo "$RESP" | jq -r '.ok')
          if [ "$OK" != "true" ]; then
            echo "Slack post failed"
            echo "$RESP"
            exit 1
          fi

          TS=$(echo "$RESP" | jq -r '.ts')
          echo "ts=$TS" >> "$GITHUB_OUTPUT"

      - name: Save Slack ts into PR comment
        if: steps.post_parent.outputs.ts != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          INITIAL_REVIEWERS=$(jq -c '[.pull_request.requested_reviewers[]?.login]' "$GITHUB_EVENT_PATH")
          META="<!-- slack-pr-bot: {\"channel\":\"${{ secrets.SLACK_CHANNEL_ID }}\",\"ts\":\"${{ steps.post_parent.outputs.ts }}\",\"initial_reviewers\":$INITIAL_REVIEWERS} -->"
          # visible 안내문 + 숨겨진 metadata 주석. find_ts 의 contains("slack-pr-bot") 검색은 주석을 그대로 잡으므로 연동에 영향 없다.
          BODY=$(printf '%s\n%s' 'Slack 스레드 연동용 메타데이터입니다. slack-pr-bot 워크플로가 자동 생성하며, 수정·삭제하면 PR 과 Slack 알림 연동이 끊깁니다.' "$META")

          curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ steps.pr.outputs.pr_number }}/comments" \
            -d "$(jq -n --arg body "$BODY" '{body:$body}')"

      - name: Update parent Slack message
        if: github.event.action != 'opened' && steps.find_ts.outputs.ts != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          mention_slack_user() {
            local github_id="$1"
            local slack_id
            slack_id=$(echo "$SLACK_USER_MAP" | jq -r --arg id "$github_id" '.[$id] // empty')

            if [ -n "$slack_id" ]; then
              echo "<@$slack_id>"
            else
              echo "$github_id"
            fi
          }

          build_reviewer_text() {
            local reviewers
            local reviewer_text
            local user_mention

            reviewers=$(jq -r '.pull_request.requested_reviewers[]?.login' "$GITHUB_EVENT_PATH")
            reviewer_text=""

            if [ -z "$reviewers" ]; then
              echo "없음"
              return
            fi

            while IFS= read -r reviewer; do
              [ -z "$reviewer" ] && continue
              user_mention=$(mention_slack_user "$reviewer")

              if [ -z "$reviewer_text" ]; then
                reviewer_text="$user_mention"
              else
                reviewer_text="$reviewer_text, $user_mention"
              fi
            done <<< "$reviewers"

            [ -z "$reviewer_text" ] && reviewer_text="없음"
            echo "$reviewer_text"
          }

          build_issue_text() {
            local pr_body="$1"
            local issues
            local issue_text
            local num
            local res
            local state
            local emoji
            local link
            local line

            issues=$(echo "$pr_body" | grep -oiE '\bclose[sd]?[[:space:]]+#[0-9]+' | grep -oE '#[0-9]+' | sort -u || true)
            issue_text=""

            if [ -z "$issues" ]; then
              echo "없음"
              return
            fi
          
            while IFS= read -r issue; do
              [ -z "$issue" ] && continue
              num=$(echo "$issue" | tr -d '#')

              res=$(curl -s \
                -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${{ github.repository }}/issues/$num")

              state=$(echo "$res" | jq -r '.state // "unknown"')

              if [ "$state" = "open" ]; then
                emoji="🟢"
              elif [ "$state" = "closed" ]; then
                emoji="⚫"
              else
                emoji="❓"
              fi

              link="https://github.com/${{ github.repository }}/issues/$num"
              line="$emoji <$link|#$num>"

              if [ -z "$issue_text" ]; then
                issue_text="$line"
              else
                issue_text=$(printf "%s\n%s" "$issue_text" "$line")
              fi
            done <<< "$issues"

            [ -z "$issue_text" ] && issue_text="없음"
            echo "$issue_text"
          }

          build_summary() {
            local pr_body="$1"
            printf '%s\n' "$pr_body" | awk '
              BEGIN { in_task=0; n=0; out="" }
              /^##/ {
                if (in_task == 1) exit
                r = $0
                sub(/^##[[:space:]]+/, "", r)
                ok = (match(r, /^[Tt][Aa][Ss][Kk]([^A-Za-z]|$)/) || match(r, /[[:space:]][Tt][Aa][Ss][Kk]([^A-Za-z]|$)/))
                if (ok) { in_task=1; next }
                next
              }
              in_task == 1 && /^##/ { exit }
              in_task == 1 {
                s = $0
                sub(/^[[:space:]]+/, "", s)
                if (s ~ /^>/) next
                if (s ~ /^-[[:space:]]*\[[[:space:]xX]\]/) next
                if (s ~ /^-[[:space:]]+/) {
                  sub(/^-[[:space:]]+/, "", s)
                  if (length(s) > 0) {
                    if (n++ > 0) out = out "\n"
                    out = out "• " s
                  }
                }
              }
              END {
                if (n > 0) print out
                else print "요약 없음"
              }
            '
          }

          CHANNEL_ID="${{ steps.find_ts.outputs.channel }}"
          PARENT_TS="${{ steps.find_ts.outputs.ts }}"
          PR_BODY=$(jq -r '.pull_request.body // ""' "$GITHUB_EVENT_PATH")
          REVIEWER_TEXT=$(build_reviewer_text)
          ISSUE_TEXT=$(build_issue_text "$PR_BODY")
          SUMMARY=$(build_summary "$PR_BODY")
          STATUS_LINE=""
          if [ "${{ github.event.action }}" = "closed" ] && [ "${{ steps.pr.outputs.merged }}" = "true" ]; then
            STATUS_LINE="✅ 머지 완료"
          elif [ "${{ github.event.action }}" = "closed" ] && [ "${{ steps.pr.outputs.merged }}" != "true" ]; then
            STATUS_LINE="🗑️ 머지 없이 종료됨"
          fi
          TITLE_LINK="<${{ steps.pr.outputs.pr_url }}|#${{ steps.pr.outputs.pr_number }} ${{ steps.pr.outputs.pr_title }}>"

          TEXT=$(cat <<EOF
          [PR] $TITLE_LINK
          $STATUS_LINE
          
          🔥 *연관 이슈*
          $ISSUE_TEXT
          
          
          📝 *작업 요약*
          $SUMMARY
          
          
          *Author*: ${{ steps.pr.outputs.author }}
          *Branch*: ${{ steps.pr.outputs.head_ref }} -> ${{ steps.pr.outputs.base_ref }}
          *Reviewer*: $REVIEWER_TEXT
          EOF
          )

          RESP=$(curl -s -X POST https://slack.com/api/chat.update \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            -H "Content-Type: application/json; charset=utf-8" \
            --data "$(jq -n \
              --arg channel "$CHANNEL_ID" \
              --arg ts "$PARENT_TS" \
              --arg text "$TEXT" \
              '{channel:$channel,ts:$ts,text:$text,unfurl_links:false,unfurl_media:false}')")

          OK=$(echo "$RESP" | jq -r '.ok')
          if [ "$OK" != "true" ]; then
            echo "Slack update failed"
            echo "$RESP"
            exit 1
          fi

      - name: Reply to thread
        if: github.event.action != 'opened' && steps.find_ts.outputs.ts != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          THREAD_TS="${{ steps.find_ts.outputs.ts }}"
          CHANNEL_ID="${{ steps.find_ts.outputs.channel }}"
          ACTION="${{ steps.pr.outputs.action }}"
          MERGED="${{ steps.pr.outputs.merged }}"

          mention_slack_user() {
            local github_id="$1"
            local slack_id
            slack_id=$(echo "$SLACK_USER_MAP" | jq -r --arg id "$github_id" '.[$id] // empty')

            if [ -n "$slack_id" ]; then
              echo "<@$slack_id>"
            else
              echo "@$github_id"
            fi
          }

          TEXT=""

          if [ "$ACTION" = "review_requested" ]; then
            REQUESTED_REVIEWER=$(jq -r '.requested_reviewer.login // ""' "$GITHUB_EVENT_PATH")
            INITIAL_REVIEWERS='${{ steps.find_ts.outputs.initial_reviewers }}'
            [ -z "$INITIAL_REVIEWERS" ] && INITIAL_REVIEWERS="[]"

            IS_INITIAL=$(echo "$INITIAL_REVIEWERS" | jq -r --arg r "$REQUESTED_REVIEWER" 'map(. == $r) | any')
            if [ "$IS_INITIAL" = "true" ]; then
              echo "Reviewer $REQUESTED_REVIEWER was present at PR open, skipping thread reply."
              exit 0
            fi

            if [ -n "$REQUESTED_REVIEWER" ]; then
              TEXT="🙋 리뷰 요청됨: $(mention_slack_user "$REQUESTED_REVIEWER")"
            else
              TEXT="🙋 리뷰 요청됨"
            fi
          elif [ "$ACTION" = "review_request_removed" ]; then
            REMOVED_REVIEWER=$(jq -r '.requested_reviewer.login // ""' "$GITHUB_EVENT_PATH")
            if [ -n "$REMOVED_REVIEWER" ]; then
              TEXT="➖ 리뷰 요청 해제됨: $(mention_slack_user "$REMOVED_REVIEWER")"
            else
              TEXT="➖ 리뷰 요청이 해제되었습니다."
            fi
          
          elif [ "$ACTION" = "synchronize" ]; then
            COMMITS_URL=$(jq -r '.pull_request.commits_url' "$GITHUB_EVENT_PATH")
            COMMITS=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$COMMITS_URL")
          
            LAST_COMMIT_MSG=$(echo "$COMMITS" | jq -r '.[-1].commit.message // ""' | head -n 1)
            COMMIT_COUNT=$(echo "$COMMITS" | jq 'length')

            if [ -n "$LAST_COMMIT_MSG" ] && [ "$LAST_COMMIT_MSG" != "null" ]; then
              TEXT=$(printf '🔄 새 커밋 추가됨 (%s commits)\n• %s' "$COMMIT_COUNT" "$LAST_COMMIT_MSG")
            else
              TEXT="🔄 새 커밋이 추가되었습니다."
            fi
          
          elif [ "$ACTION" = "closed" ] && [ "$MERGED" = "true" ]; then
            TEXT="✅ PR #${{ steps.pr.outputs.pr_number }} 머지 완료: ${{ steps.pr.outputs.head_ref }} -> ${{ steps.pr.outputs.base_ref }}"
          elif [ "$ACTION" = "closed" ] && [ "$MERGED" != "true" ]; then
            TEXT="🗑️ PR #${{ steps.pr.outputs.pr_number }} 이 머지 없이 닫혔습니다: ${{ steps.pr.outputs.head_ref }} -> ${{ steps.pr.outputs.base_ref }}"
          else
            echo "No message needed."
            exit 0
          fi

          RESP=$(curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            -H "Content-Type: application/json; charset=utf-8" \
            --data "$(jq -n \
              --arg channel "$CHANNEL_ID" \
              --arg text "$TEXT" \
              --arg thread_ts "$THREAD_TS" \
              '{channel:$channel,text:$text,thread_ts:$thread_ts,reply_broadcast:false,unfurl_links:false,unfurl_media:false}')")

          OK=$(echo "$RESP" | jq -r '.ok')
          if [ "$OK" != "true" ]; then
            echo "Slack reply failed"
            echo "$RESP"
            exit 1
          fi

  alert-direct-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      SLACK_USER_MAP: '{"m-a-king":"U0AKAEF2K9U","1o18z":"U0AKQ6G8BT3","sevineleven":"U0AK6U2J62F"}'
    steps:
      - name: Check if direct push (not a PR merge)
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          PR_LIST=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls?state=closed&base=main&sort=updated&direction=desc&per_page=20")

          PR_COUNT=$(echo "$PR_LIST" | jq --arg sha "${{ github.sha }}" '[.[] | select(.merge_commit_sha == $sha)] | length')
          echo "pr_count=$PR_COUNT" >> "$GITHUB_OUTPUT"

      - name: Send Slack alert
        if: steps.check.outputs.pr_count == '0'
        shell: bash
        run: |
          PUSHER="${{ github.actor }}"
          SLACK_ID=$(echo "$SLACK_USER_MAP" | jq -r --arg login "$PUSHER" '.[$login] // empty')

          if [ -n "$SLACK_ID" ]; then
            PUSHER_MENTION="<@$SLACK_ID>"
          else
            PUSHER_MENTION="$PUSHER"
          fi

          COMMIT_MSG=$(jq -r '.head_commit.message // ""' "$GITHUB_EVENT_PATH" | head -n 1)
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          COMMIT_URL="https://github.com/${{ github.repository }}/commit/${{ github.sha }}"

          SOUNDS=("비상비상 애옹애옹 🐱" "비상비상 멍멍멍멍 🐶" "비상비상 크르르릉~~~!!! 🐯" "비상비상 꽥꽥꽥꽥 🦆" "비상비상 어흥어흥!!! 🦁" "비상비상 뀨뀨뀨뀨 🐹" "비상비상 히이이잉~~~ 🐴" "비상비상 총총총총 🐰")
          SOUND="${SOUNDS[$RANDOM % ${#SOUNDS[@]}]}"

          TEXT=$(printf '<!channel> 🚨🚨🚨 %s 님이 main에 *직접 푸시* 했어요!!\n%s\n\n• *커밋*: <%s|%s>\n• *메시지*: %s' \
            "$PUSHER_MENTION" \
            "$SOUND" \
            "$COMMIT_URL" \
            "$SHORT_SHA" \
            "$COMMIT_MSG")

          RESP=$(curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            -H "Content-Type: application/json; charset=utf-8" \
            --data "$(jq -n \
              --arg channel "${{ secrets.SLACK_CHANNEL_ID }}" \
              --arg text "$TEXT" \
              '{channel:$channel,text:$text,blocks:[{type:"section",text:{type:"mrkdwn",text:$text}}],unfurl_links:false}')")

          OK=$(echo "$RESP" | jq -r '.ok')
          if [ "$OK" != "true" ]; then
            echo "Slack post failed: $RESP"
            exit 1
          fi
spring:
  application:
    name: team3
  config:
    import: optional:file:.env[.properties]
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:team3}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
    username: ${DB_USERNAME:team3}
    password: ${DB_PASSWORD:team3}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

gemini:
  api-key: ${GEMINI_API_KEY:}
  # preview 모델은 2 주 사전공지 후 deprecate 정책이라 운영 안정성을 위해 GA 모델 사용.
  model: ${GEMINI_MODEL:gemini-2.5-flash}
  retry:
    # max-attempts 는 한 요청이 유발할 수 있는 billed API 호출 횟수 상한. 기본 1 = 재시도 없음.
    # 재시도가 필요하면 비용·quota 보고 환경변수로 2 이상으로 올린다.
    max-attempts: ${GEMINI_RETRY_MAX_ATTEMPTS:1}
    initial-delay-ms: ${GEMINI_RETRY_INITIAL_DELAY_MS:1000}

springdoc:
  api-docs:
    path: /v3/api-docs
  default-produces-media-type: application/json

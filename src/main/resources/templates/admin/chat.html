<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/layout :: head('AI 어시스턴트 - PIKI 백오피스')}"></head>
<body>
<div class="bo-shell">
    <div th:replace="~{admin/fragments/layout :: sidebar('chat')}"></div>
    <main class="bo-main">
        <header class="bo-header">
            <h1>AI 어시스턴트</h1>
        </header>
        <div class="chat-area">
            <div id="messages" class="messages"></div>
            <div id="confirm-area"></div>
            <form id="chat-form" class="chat-input">
                <input type="text" id="message-input" placeholder="예: 최근 등록된 item 5개 보여줘" autocomplete="off" autofocus>
                <button type="submit">전송</button>
            </form>
        </div>
    </main>
</div>
<script th:src="@{/admin-assets/chat.js}"></script>
</body>
</html>

spring:
  application:
    name: PIKI-test
  config:
    import: optional:file:.env.test[.properties]
  # test classpath 의 application.yml 이 main 을 대체하므로, dicebear backfill 마이그레이션이 쓰는
  # Flyway placeholder 를 여기에도 둔다. s3.public-base-url(아래 test 값)을 참조해 어디서 돌든 값이 있다.
  flyway:
    placeholders:
      s3publicbaseurl: ${s3.public-base-url}

# 운영 OAuthClientConfig 의 실제 클라이언트 빈을 테스트 컨텍스트에서는 끈다.
# 그러면 IntegrationStubs 의 stub(googleOAuthClient/kakaoOAuthClient)만 남아 외부 호출 없이 격리된다.
# google/kakao 더미 값: GoogleProperties·KakaoProperties 는 @ConfigurationPropertiesScan 으로
# 빈이 생성되고 @Validated(@NotBlank) 라, 값이 없으면 컨텍스트 로딩이 깨진다. 실제 호출은 stub 이
# 대체하므로 값은 쓰이지 않는다 (test classpath 의 application.yml 이 main 을 대체하므로 여기 박는다).
oauth:
  client:
    enabled: false
  google:
    client-id: test-google-client-id
    client-secret: test-google-client-secret
    redirect-uri: http://localhost/auth/callback/google
  kakao:
    client-id: test-kakao-client-id
    client-secret: test-kakao-client-secret
    redirect-uri: http://localhost/auth/callback/kakao
  apple:
    team-id: test-team-id
    key-id: test-key-id
    client-id: test-apple-client-id
    bundle-id: com.test.app
    private-key: test-private-key
    redirect-uri: http://localhost/auth/callback/apple
    web-callback-url: https://test.piki.day/auth/callback/apple

# 컨텍스트 로딩만 통과시키기 위한 더미 fallback. 실제 Gemini 호출 테스트는 @Disabled 또는
# @EnabledIfEnvironmentVariable 로 별도 격리되어 있으므로 CI 에서 GEMINI_API_KEY 가 없어도
# 컨텍스트 로딩 자체는 깨지지 않는다.
gemini:
  api-key: ${GEMINI_API_KEY:test-dummy-key}
  # model 미지정 → GeminiProperties.DEFAULT_MODEL 적용. 테스트는 외부 호출을 stub 하므로 모델 문자열은 실제로 쓰이지 않는다.

# 운영 application.yml 은 JWT_SECRET env 를 강제하지만 테스트는 dummy secret 으로
# 컨텍스트 로딩만 통과시킨다 (HS256 최소 키 길이 32 bytes 충족).
# 만료 시간은 운영과 동일한 default 값을 명시한다 — test classpath 의 application.yml 이
# main classpath 의 application.yml 을 대체하므로 jwt 섹션은 필요한 모든 필드를 박는다.
jwt:
  secret: ${JWT_SECRET:test-jwt-secret-key-must-be-at-least-32-chars!}
  access-token-expiry: 1h
  refresh-token-expiry: 14d

# S3 업로드는 ImageStorage stub 으로 격리되지만, S3Properties·S3Client 빈 자체는 컨텍스트에 생성되므로
# 더미 값으로 부팅만 통과시킨다 (S3Properties.init 의 notBlank 검증 충족).
s3:
  bucket: test-bucket
  region: ap-northeast-2
  public-base-url: https://test-bucket.s3.ap-northeast-2.amazonaws.com

# actuator 노출은 운영과 동일하게 박는다 — test classpath 의 application.yml 이 main 을 대체하므로
# 여기 없으면 health(기본 노출)만 떠 /actuator/prometheus 통합 테스트가 깨진다.
management:
  endpoints:
    web:
      exposure:
        include: health, prometheus, loggers
  metrics:
    tags:
      application: ${spring.application.name}
